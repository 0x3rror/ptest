<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIMEASX - Watch Anime Online</title>
    
    <!-- Scripts to run React and Tailwind directly in the browser -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #0b0c0f; color: #ececec; margin: 0; }
        .hero-mask { background: linear-gradient(0deg, #0b0c0f 0%, rgba(11,12,15,0.8) 50%, rgba(11,12,15,0.3) 100%); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #14151a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #9c88ff; border-radius: 10px; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card-hover:hover img { transform: scale(1.1); }
        .card-hover:hover { color: #9c88ff; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Icons as simple SVG functions
        const SearchIcon = () => (
            <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        );
        const PlayIcon = () => (
            <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        );

        function App() {
            const [view, setView] = useState('home');
            const [animeList, setAnimeList] = useState([]);
            const [spotlight, setSpotlight] = useState(null);
            const [selected, setSelected] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                fetchContent('https://api.jikan.moe/v4/seasons/now?limit=24');
            }, []);

            const fetchContent = async (url) => {
                setLoading(true);
                try {
                    const res = await fetch(url);
                    const data = await res.json();
                    setAnimeList(data.data || []);
                    if (data.data && !spotlight) setSpotlight(data.data[0]);
                } catch (e) { console.error("Error fetching data", e); }
                setLoading(false);
            };

            const handleSearch = (e) => {
                e.preventDefault();
                if (!searchQuery.trim()) return;
                setView('search');
                fetchContent(`https://api.jikan.moe/v4/anime?q=${searchQuery}&limit=24`);
            };

            const openWatch = (anime) => {
                setSelected(anime);
                setView('watch');
                window.scrollTo(0, 0);
            };

            const Navbar = () => (
                <nav className="flex items-center justify-between px-6 py-4 bg-[#14151a] sticky top-0 z-50 border-b border-white/5 shadow-2xl">
                    <h1 onClick={() => { setView('home'); fetchContent('https://api.jikan.moe/v4/seasons/now?limit=24'); }} className="text-2xl font-black tracking-tighter cursor-pointer text-white">
                        ANIME<span className="text-[#9c88ff]">ASX</span>
                    </h1>
                    <form onSubmit={handleSearch} className="flex bg-[#24252c] rounded overflow-hidden border border-white/5">
                        <input 
                            className="bg-transparent px-4 py-2 text-sm outline-none w-40 md:w-80 text-white" 
                            placeholder="Search anime..." 
                            value={searchQuery}
                            onChange={(e) => setSearchQuery(e.target.value)}
                        />
                        <button className="bg-[#9c88ff] p-2 px-4 text-white hover:bg-[#836ce6] transition-colors">
                            <SearchIcon />
                        </button>
                    </form>
                </nav>
            );

            const Home = () => (
                <div className="animate-in fade-in duration-500">
                    {spotlight && (
                        <div className="relative h-[65vh] flex items-center px-6 md:px-12">
                            <img src={spotlight.images.jpg.large_image_url} className="absolute inset-0 w-full h-full object-cover opacity-20 blur-sm" />
                            <div className="absolute inset-0 hero-mask" />
                            <div className="relative z-10 max-w-2xl">
                                <h2 className="text-5xl md:text-7xl font-black mb-4 uppercase leading-none">{spotlight.title_english || spotlight.title}</h2>
                                <p className="text-gray-400 line-clamp-2 mb-8 text-sm md:text-base leading-relaxed">{spotlight.synopsis}</p>
                                <button onClick={() => openWatch(spotlight)} className="bg-[#9c88ff] px-10 py-4 rounded-md font-black flex items-center gap-3 hover:bg-[#836ce6] transition shadow-lg shadow-[#9c88ff]/20">
                                    <PlayIcon /> WATCH NOW
                                </button>
                            </div>
                        </div>
                    )}
                    <div className="p-8 max-w-[1400px] mx-auto">
                        <h3 className="text-xl font-black mb-8 border-l-4 border-[#9c88ff] pl-4 uppercase tracking-widest">Recently Added</h3>
                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
                            {animeList.map(anime => (
                                <div key={anime.mal_id} onClick={() => openWatch(anime)} className="cursor-pointer card-hover transition-colors">
                                    <div className="aspect-[3/4.5] rounded-md overflow-hidden relative bg-[#1a1c22] shadow-xl">
                                        <img src={anime.images.jpg.large_image_url} className="w-full h-full object-cover transition duration-500" />
                                        <div className="absolute bottom-0 w-full p-2 bg-black/70 backdrop-blur-sm text-[10px] font-bold flex justify-between text-white">
                                            <span>EP {anime.episodes || '?'}</span>
                                            <span>{anime.type}</span>
                                        </div>
                                    </div>
                                    <h4 className="mt-3 text-sm font-bold line-clamp-2 leading-snug">{anime.title}</h4>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            const Watch = () => (
                <div className="p-4 md:p-10 max-w-6xl mx-auto animate-in slide-in-from-bottom-4 duration-500">
                    <div className="aspect-video bg-black rounded-xl overflow-hidden shadow-2xl border border-white/5">
                        <iframe 
                            src={`https://www.youtube.com/embed/${selected.trailer?.youtube_id || 'dQw4w9WgXcQ'}?autoplay=1`} 
                            className="w-full h-full" 
                            allowFullScreen 
                        />
                    </div>
                    <div className="mt-8 flex flex-col md:flex-row gap-10 bg-[#14151a] p-8 rounded-xl border border-white/5 shadow-xl">
                        <img src={selected.images.jpg.large_image_url} className="w-48 h-max rounded-lg shadow-2xl border border-white/10" />
                        <div>
                            <h2 className="text-4xl font-black mb-4 text-white leading-tight uppercase tracking-tighter">{selected.title}</h2>
                            <div className="flex gap-4 mb-6 text-xs font-bold">
                                <span className="text-[#9c88ff] bg-[#9c88ff]/10 px-3 py-1 rounded-full">★ {selected.score}</span>
                                <span className="text-gray-500 bg-white/5 px-3 py-1 rounded-full uppercase">{selected.status}</span>
                            </div>
                            <p className="text-gray-400 leading-relaxed text-sm md:text-base italic">{selected.synopsis}</p>
                            <button onClick={() => setView('home')} className="mt-8 text-[#9c88ff] font-black uppercase text-xs tracking-widest hover:text-white transition-colors flex items-center gap-2">
                                <span>←</span> Back to library
                            </button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen custom-scrollbar">
                    <Navbar />
                    {loading ? (
                        <div className="flex items-center justify-center h-[70vh]">
                            <div className="w-12 h-12 border-4 border-[#9c88ff]/20 border-t-[#9c88ff] rounded-full animate-spin"></div>
                        </div>
                    ) : (
                        <div>
                            {view === 'home' && <Home />}
                            {view === 'watch' && <Watch />}
                            {view === 'search' && (
                                <div className="p-8 max-w-[1400px] mx-auto min-h-screen">
                                    <h3 className="text-xl font-black mb-8 uppercase tracking-widest text-white">
                                        Searching for: <span className="text-[#9c88ff]">"{searchQuery}"</span>
                                    </h3>
                                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
                                        {animeList.map(anime => (
                                            <div key={anime.mal_id} onClick={() => openWatch(anime)} className="cursor-pointer card-hover transition-colors">
                                                <div className="aspect-[3/4.5] rounded-md overflow-hidden bg-[#1a1c22]">
                                                    <img src={anime.images.jpg.large_image_url} className="w-full h-full object-cover" />
                                                </div>
                                                <h4 className="mt-3 text-sm font-bold line-clamp-2">{anime.title}</h4>
                                            </div>
                                        ))}
                                    </div>
                                    {animeList.length === 0 && <p className="text-center text-gray-500 py-20">No results found for your search.</p>}
                                </div>
                            )}
                        </div>
                    )}
                    <footer className="py-20 text-center border-t border-white/5 mt-20">
                        <h1 className="text-xl font-black text-white/20 mb-4 tracking-[0.3em] uppercase">ANIMEASX</h1>
                        <p className="text-[10px] font-bold text-gray-700 tracking-[0.5em] uppercase">
                            © 2024 • Watch Anime Free
                        </p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
